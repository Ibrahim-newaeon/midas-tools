<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#BD2122">
<meta name="description" content="Midas Furniture Ad Template Generator - Image & Video">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Midas Ad Template Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@emran-alhaddad/saudi-riyal-font/index.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0B0B;--surface:#151518;--border:#1E1E24;--border2:#2A2A32;--red:#BD2122;--gold:#C8A04A;--text:#E8E4DE;--muted:#666;--dim:#444}
body{background:var(--bg);color:var(--text);font-family:'Cairo',system-ui,sans-serif;min-height:100vh}
.hdr{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo img{height:24px;border-radius:3px}
.hdr-tag{color:var(--dim);font-size:10px;letter-spacing:1px;text-transform:uppercase}
.hdr-btns{display:flex;gap:6px}
.wrap{display:flex;height:calc(100vh - 49px - 37px)}
.panel{width:310px;border-right:1px solid var(--border);overflow-y:auto;padding:14px 16px;flex-shrink:0}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.preview-area{flex:1;overflow-y:auto;padding:20px;background:#050507}
.preview-area::-webkit-scrollbar{width:6px}
.preview-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.sec{margin-bottom:14px}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.row{display:flex;gap:6px}
.row>*{flex:1}
.chip{padding:7px 8px;border-radius:7px;font-size:11px;cursor:pointer;text-align:center;border:2px solid var(--border2);background:var(--surface);color:#888;transition:all .15s;user-select:none}
.chip:hover{border-color:#555;background:#1a1a22}
.chip.on{border-color:#fff;background:rgba(189,33,34,.15);color:#fff;font-weight:600}
.chip small{font-size:9px;opacity:.55;display:block}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:38px;height:38px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0;outline:2px solid var(--border2)}
.sw:hover{outline-color:#555}
.sw.on{outline-color:#fff;border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.25)}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid var(--border2);background:var(--surface);color:#BBB}
.btn:hover{border-color:#555;background:#1a1a22}
.btn:active{transform:scale(.97)}
.btn.red{border:none;background:var(--red);color:#fff}
.btn.red:hover{background:#d42526}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.full{width:100%}
.btn.sm{padding:5px 10px;font-size:11px}
.fld{margin-bottom:7px}
.fld label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px}
.fld input,.fld select{width:100%;padding:8px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus{border-color:var(--red)}
.foot{padding-top:10px;border-top:1px solid var(--border);margin-top:8px;font-size:10px;color:var(--dim)}
canvas{border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.prod-card-top{display:flex;gap:16px;align-items:flex-start}
.prod-card canvas{flex-shrink:0;cursor:pointer}
.prod-fields{flex:1;min-width:0}
.prod-fields .fld input{font-size:12px;padding:6px 8px}
.prod-card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.prod-num{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.empty-state{text-align:center;color:var(--dim);padding:80px 20px;font-size:14px}
.empty-state div{font-size:40px;margin-bottom:12px;opacity:.3}
.badge-count{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
.mode-toggle{display:flex;border:2px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:14px}
.mode-toggle button{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:var(--surface);color:#888;font-family:inherit}
.mode-toggle button.on{background:var(--red);color:#fff}
.recording-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#E53E3E;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:768px){
  .wrap{flex-direction:column;height:auto}
  .panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .preview-area{min-height:400px}
  .prod-card-top{flex-direction:column}
}
</style>
<style id="shared-nav-css">
.tn{padding:8px 16px;border-bottom:1px solid #1E1E24;display:flex;align-items:center;gap:12px;background:#0B0B0B;font-family:'Cairo',system-ui,sans-serif;position:relative;z-index:999}
.tn-brand{font-weight:700;font-size:12px;color:#666;letter-spacing:1px;text-decoration:none}
.tn-links{display:flex;gap:4px;margin-left:auto}
.tn-links a{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;color:#888;border:1px solid #2A2A32;transition:all .15s}
.tn-links a:hover{border-color:#555;color:#ddd}
.tn-links a.on{border-color:#BD2122;background:rgba(189,33,34,.15);color:#fff}
</style>
</head>
<body>
<div class="tn">
<a href="../" class="tn-brand">MIDAS TOOLS</a>
<div class="tn-links"><a href="../">Home</a><a href="../ads/" class="on">Ad Generator</a><a href="../sku/">SKU Reader</a></div>
</div>
<div class="hdr">
  <div class="hdr-logo"><img id="hdrLogoImg" alt="midas"><span class="hdr-tag">Ad Template Generator</span></div>
  <div class="hdr-btns">
    <button class="btn red" id="btnExportAll" data-testid="export-all-btn" disabled>Export All</button>
  </div>
</div>
<div class="wrap">
  <div class="panel">
    <div class="mode-toggle" id="modeToggle">
      <button class="on" data-mode="image">📷 Image</button>
      <button data-mode="video">🎬 Video</button>
    </div>
    <div id="videoSettings" style="display:none">
      <div class="sec">
        <div class="sec-lbl">Video Duration</div>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="durSlider" min="5" max="20" value="10" style="flex:1;accent-color:var(--red)">
          <span id="durLabel" style="font-size:14px;font-weight:700;color:var(--red);min-width:32px">10s</span>
        </div>
      </div>
      <div class="sec">
        <div class="sec-lbl">Background Music</div>
        <input type="file" id="musicIn" accept="audio/*" style="display:none">
        <button class="btn full" id="btnMusic">🎵 Upload Music</button>
        <div id="musicInfo" style="font-size:10px;color:var(--dim);margin-top:4px;text-align:center">MP3, WAV, OGG — trims to video duration</div>
      </div>
    </div>
    <div class="sec"><div class="sec-lbl">Platform</div><div class="g2" id="platGrid"></div></div>
    <div class="sec"><div class="sec-lbl">Template</div><div class="g2" id="tmplGrid"></div></div>
    <div class="sec"><div class="sec-lbl">Color Scheme</div><div class="swatches" id="schemeRow"></div></div>
    <div class="sec"><div class="sec-lbl">Language & Market</div>
      <div class="row"><button class="btn" id="btnLang">EN → عربي</button><div class="fld" style="margin:0"><select id="selMarket"></select></div></div>
    </div>
    <div class="sec"><div class="sec-lbl" id="lblShared">Shared Text</div>
      <div class="fld"><label id="L_hl">Headline</label><input id="F_hl" value="Premium Comfort"></div>
      <div class="fld"><label id="L_sub">Subline</label><input id="F_sub" value="Designed for your home"></div>
    </div>
    <div class="sec"><div class="sec-lbl">Upload Products</div>
      <input type="file" id="fileIn" accept="image/*" multiple style="display:none">
      <button class="btn full red" id="btnUpload">+ Upload Product Images</button>
      <div style="font-size:10px;color:var(--dim);margin-top:4px;text-align:center">Select multiple images at once</div>
    </div>
    <div class="foot" id="footInfo"></div>
  </div>
  <div class="preview-area" id="previewArea">
    <div class="empty-state" id="emptyState"><div>🛋️</div>Upload product images to generate ads</div>
  </div>
</div>

/* ═══ HELPERS ═══ */
function hex2rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}
function star(c,x,y,r,col){c.fillStyle=col;c.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;c[i?"lineTo":"moveTo"](x+r*Math.cos(a),y+r*Math.sin(a))}c.closePath();c.fill()}
function wrap(c,t,x,y,mw,lh){const w=t.split(" ");let ln="";const ls=[];for(const s of w){const test=ln?ln+" "+s:s;if(c.measureText(test).width>mw&&ln){ls.push(ln);ln=s}else ln=test}if(ln)ls.push(ln);for(let i=ls.length-1;i>=0;i--)c.fillText(ls[i],x,y-(ls.length-1-i)*lh);return ls.length}
function ease(t){return t<.5?2*t*t:(1-((-2*t+2)**2)/2)} // easeInOutQuad
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t))}
function anim(t,start,dur){return Math.max(0,Math.min(1,(t-start)/dur))} // 0→1 within window

/* ═══ ANIMATION TIMELINE (10s) ═══
  0.0-1.0s: BG fade in + Ken Burns starts
  0.5-1.5s: Logo fade in
  1.5-3.0s: Product name slide up + fade
  3.0-4.5s: Headline slide up + fade
  4.5-5.5s: Subline fade in
  5.5-7.0s: Old price + strikethrough animate
  7.0-8.5s: New price + discount pop
  8.5-10s:  Hold
═══ */
function timeline(t){
  // t is 0-1 over 10 seconds
  return{
    bg:     ease(anim(t, 0,   .10)),  // 0-1s
    kenBurn:t,                         // continuous
    logo:   ease(anim(t, .05, .10)),  // 0.5-1.5s
    pName:  ease(anim(t, .15, .12)),  // 1.5-2.7s
    hl:     ease(anim(t, .30, .12)),  // 3.0-4.2s
    sub:    ease(anim(t, .45, .10)),  // 4.5-5.5s
    oldP:   ease(anim(t, .55, .10)),  // 5.5-6.5s
    strike: ease(anim(t, .60, .08)),  // 6.0-6.8s
    newP:   ease(anim(t, .70, .10)),  // 7.0-8.0s
    badge:  ease(anim(t, .78, .07)),  // 7.8-8.5s
  };
}

/* ═══ DRAW ENGINE ═══ */
function draw(cvs,prod,t){
  // t: undefined=static image, 0-1=animation progress
  const isAnimated=t!==undefined;
  const a=isAnimated?timeline(t):{bg:1,kenBurn:0,logo:1,pName:1,hl:1,sub:1,oldP:1,strike:1,newP:1,badge:1};

  const P=PLAT[S.plat],C=SCH[S.sch];
  const hl=$("F_hl").value,sub=$("F_sub").value;
  const W=P.w,H=P.h;cvs.width=W;cvs.height=H;
  const c=cvs.getContext("2d");
  const ar=S.lang==="ar",vt=H>W,s=W/1080;
  const isKSA=S.mkt==="KSA",cur=CUR[S.mkt]||"KD";

  // BG
  c.fillStyle=C.bg;c.fillRect(0,0,W,H);
  c.save();c.globalAlpha=.035;c.fillStyle=C.pri;
  for(let i=0;i<W;i+=38*s)for(let j=0;j<H;j+=38*s)c.fillRect(i,j,1.2*s,1.2*s);
  c.restore();

  // Template decor
  if(S.tmpl==="eid_ramadan"){
    c.save();c.globalAlpha=.07*a.bg;const mx=W*.85,my=H*.11,mr=60*s;
    c.beginPath();c.arc(mx,my,mr,0,Math.PI*2);c.fillStyle=C.pri;c.fill();
    c.beginPath();c.arc(mx+20*s,my-10*s,mr*.85,0,Math.PI*2);c.fillStyle=C.bg;c.fill();
    for(let i=0;i<9;i++)star(c,W*(.55+Math.sin(i*1.3)*.35),H*(.04+Math.cos(i*.9)*.09),4*s,C.pri);
    c.restore();c.save();c.strokeStyle=C.pri;c.lineWidth=2*s;c.globalAlpha=.12*a.bg;
    c.beginPath();c.moveTo(W*.12,H*.24);c.quadraticCurveTo(W*.5,H*.01,W*.88,H*.24);c.stroke();c.restore();
  }else if(S.tmpl==="sale_promo"){
    c.save();c.globalAlpha=.06*a.bg;c.fillStyle=C.pri;c.beginPath();c.moveTo(W*.55,0);c.lineTo(W,0);c.lineTo(W,H*.28);c.closePath();c.fill();c.restore();
  }else if(S.tmpl==="new_arrival"){
    c.save();c.globalAlpha=.05*a.bg;c.strokeStyle=C.pri;c.lineWidth=1.5*s;const m=40*s,l=80*s;
    [[m,m,1,1],[W-m,m,-1,1],[m,H-m,1,-1],[W-m,H-m,-1,-1]].forEach(([x,y,dx,dy])=>{c.beginPath();c.moveTo(x,y+l*dy);c.lineTo(x,y);c.lineTo(x+l*dx,y);c.stroke()});c.restore();
  }

  // Product image as background with Ken Burns
  if(prod.img){
    c.save();
    c.globalAlpha=a.bg;
    const ir=prod.img.width/prod.img.height,cr=W/H;
    let sw,sh,sx,sy;
    if(ir>cr){sh=prod.img.height;sw=sh*cr;sx=(prod.img.width-sw)/2;sy=0}
    else{sw=prod.img.width;sh=sw/cr;sx=0;sy=(prod.img.height-sh)/2}
    // Ken Burns: slow zoom from 1.0 to 1.08
    const zoom=lerp(1.0,1.08,a.kenBurn);
    const zW=W*zoom,zH=H*zoom;
    const zX=(W-zW)/2,zY=(H-zH)/2;
    c.drawImage(prod.img,sx,sy,sw,sh,zX,zY,zW,zH);
    c.restore();
  }

  // Gradients
  const hasImg=!!prod.img;const isSt=P.r==="9:16";const safePx=isSt?250*s:0;
  const gH=vt?(H*.55+safePx*.5):(H*.6);
  const gr=c.createLinearGradient(0,H-gH,0,H);
  gr.addColorStop(0,"rgba(0,0,0,0)");gr.addColorStop(hasImg?.25:.35,hex2rgba(C.bg,hasImg?.6:.82));
  gr.addColorStop(.6,hex2rgba(C.bg,hasImg?.88:.94));gr.addColorStop(1,hex2rgba(C.bg,hasImg?.97:.97));
  c.fillStyle=gr;c.fillRect(0,H-gH,W,gH);
  const topGH=isSt?H*.25:H*.2;const tg2=c.createLinearGradient(0,0,0,topGH);
  tg2.addColorStop(0,hex2rgba(C.bg,hasImg?.85:.9));tg2.addColorStop(1,"rgba(0,0,0,0)");
  c.fillStyle=tg2;c.fillRect(0,0,W,topGH);

  // Logo
  const pad=42*s,topSafe=isSt?250*s:0,logoY=pad+topSafe;
  c.save();c.globalAlpha=a.logo;
  const activeLogo=ar?logoAr:logoEn;
  if(activeLogo.complete&&activeLogo.naturalWidth>0){
    const lh=42*s,lw=lh*(activeLogo.naturalWidth/activeLogo.naturalHeight);
    c.drawImage(activeLogo,ar?W-pad-lw:pad,logoY,lw,lh);
  }else{
    c.fillStyle="#fff";c.font=`bold ${28*s}px 'Cairo',sans-serif`;
    c.textAlign=ar?"right":"left";c.textBaseline="top";c.fillText(ar?"ميداس":"midas",ar?W-pad:pad,logoY);
  }
  c.restore();

  // Text block
  const tp=46*s,tX=ar?W-tp:tp,al=ar?"right":"left",mxW=W-tp*2;
  const safeBottom=isSt?250*s:0;
  c.textAlign=al;c.textBaseline="bottom";
  let y=H-tp-safeBottom;

  // Price row
  const hasOp=!!prod.op,hasNp=!!prod.np;
  if(hasOp||hasNp){
    if(hasOp&&hasNp){
      // Old price
      c.save();c.globalAlpha=.4*a.oldP;
      c.font=`${22*s}px 'Cairo',sans-serif`;c.fillStyle=C.txt;
      let oW;
      if(isKSA){const nw=c.measureText(prod.op).width;c.fillText(prod.op,tX,y);
        c.font=`${22*s}px 'saudi_riyal',sans-serif`;const sw2=c.measureText(SAR).width;
        c.fillText(SAR,ar?tX-nw-6*s:tX+nw+6*s,y);oW=nw+sw2+6*s;
      }else{const str=cur+" "+prod.op;oW=c.measureText(str).width;c.fillText(str,tX,y)}
      c.restore();
      // Strikethrough
      const lx=ar?tX-oW:tX,lY=y-8*s;
      c.save();c.strokeStyle=C.pri;c.lineWidth=2.5*s;c.globalAlpha=.8*a.strike;
      const strikeW=(oW+8*s)*a.strike;
      c.beginPath();c.moveTo(lx-4*s,lY);c.lineTo(lx-4*s+strikeW,lY);c.stroke();
      c.restore();
      // New price
      c.save();c.globalAlpha=a.newP;c.fillStyle=C.pri;
      const nx=ar?tX-oW-26*s:tX+oW+26*s;
      let npEndX=nx;
      if(isKSA){c.font=`bold ${38*s}px 'Cairo',sans-serif`;c.fillText(prod.np,nx,y+6*s);
        const dpW=c.measureText(prod.np).width;c.font=`bold ${38*s}px 'saudi_riyal_bold',sans-serif`;
        const symX=ar?nx-dpW-8*s:nx+dpW+8*s;c.fillText(SAR,symX,y+6*s);
        npEndX=ar?symX-c.measureText(SAR).width:symX+c.measureText(SAR).width;
      }else{const npStr=cur+" "+prod.np;c.font=`bold ${38*s}px 'Cairo',sans-serif`;c.fillText(npStr,nx,y+6*s);
        npEndX=ar?nx-c.measureText(npStr).width:nx+c.measureText(npStr).width}
      c.restore();
      // Discount badge
      const opN=parseFloat(prod.op),npN=parseFloat(prod.np);
      if(opN>0&&npN>0&&opN>npN){
        c.save();c.globalAlpha=a.badge;
        const pct=Math.round((1-npN/opN)*100);const bTxt=`${pct}%`;
        c.font=`bold ${16*s}px 'Cairo',sans-serif`;const btw=c.measureText(bTxt).width;
        const bbw=btw+20*s,bbh=30*s;const bbx=ar?npEndX-bbw-12*s:npEndX+12*s;
        const bby=y+6*s-bbh/2-4*s;
        const badgeScale=lerp(.5,1,a.badge);
        c.translate(bbx+bbw/2,bby+bbh/2);c.scale(badgeScale,badgeScale);c.translate(-(bbx+bbw/2),-(bby+bbh/2));
        c.fillStyle="#E53E3E";rr(c,bbx,bby,bbw,bbh,6*s);c.fill();
        c.fillStyle="#FFF";c.textAlign="center";c.textBaseline="middle";
        c.fillText(bTxt,bbx+bbw/2,bby+bbh/2);
        c.restore();
        c.textAlign=al;c.textBaseline="bottom";
      }
    }else{
      const pv=hasNp?prod.np:prod.op;
      c.save();c.globalAlpha=a.newP;c.fillStyle=C.pri;
      if(isKSA){c.font=`bold ${34*s}px 'Cairo',sans-serif`;c.fillText(pv,tX,y);
        const nw=c.measureText(pv).width;c.font=`bold ${34*s}px 'saudi_riyal_bold',sans-serif`;
        c.fillText(SAR,ar?tX-nw-8*s:tX+nw+8*s,y);
      }else{c.font=`bold ${34*s}px 'Cairo',sans-serif`;c.fillText(cur+" "+pv,tX,y)}
      c.restore();
    }
    y-=50*s;
  }

  // Subline
  if(sub){c.save();c.globalAlpha=.65*a.sub;c.fillStyle=C.txt;c.font=`${32*s}px 'Cairo',sans-serif`;
    c.textAlign=al;c.textBaseline="bottom";
    const slideY=isAnimated?lerp(20*s,0,a.sub):0;
    const ln=wrap(c,sub,tX,y+slideY,mxW,38*s);y-=ln*38*s+10*s;c.restore()}

  // Headline
  if(hl){c.save();c.globalAlpha=a.hl;c.fillStyle=C.txt;c.font=`bold ${(vt?46:42)*s}px 'Cairo',sans-serif`;
    c.textAlign=al;c.textBaseline="bottom";
    const slideY=isAnimated?lerp(30*s,0,a.hl):0;
    const ln=wrap(c,hl,tX,y+slideY,mxW,54*s);y-=ln*54*s+10*s;c.restore()}

  // Product name
  if(prod.name){c.save();c.textAlign=al;c.textBaseline="bottom";
    c.globalAlpha=.5*a.pName;
    const slideY=isAnimated?lerp(20*s,0,a.pName):0;
    c.font=`${30*s}px 'Cairo',sans-serif`;c.fillStyle=C.txt;
    c.fillText(prod.name,tX,y-24*s+slideY);c.restore()}
}

/* ═══ VIDEO RECORDING (with audio) ═══ */
const VID_FPS=30;

function recordVideo(prod,onProgress,onDone){
  const dur=S.dur;
  const offCvs=document.createElement("canvas");
  const P=PLAT[S.plat];
  offCvs.width=P.w;offCvs.height=P.h;

  const videoStream=offCvs.captureStream(VID_FPS);
  let combinedStream=videoStream;

  // Audio context for mixing music
  const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const dest=audioCtx.createMediaStreamDestination();
  let sourceNode=null;

  if(musicBuffer){
    sourceNode=audioCtx.createBufferSource();
    sourceNode.buffer=musicBuffer;
    // Fade out envelope
    const gain=audioCtx.createGain();
    gain.gain.setValueAtTime(1,audioCtx.currentTime);
    gain.gain.setValueAtTime(1,audioCtx.currentTime+dur-1);
    gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    sourceNode.connect(gain);
    gain.connect(dest);
    // Combine video + audio streams
    const tracks=[...videoStream.getVideoTracks(),...dest.stream.getAudioTracks()];
    combinedStream=new MediaStream(tracks);
  }

  // Pick codec
  let mimeType='video/webm;codecs=vp9,opus';
  if(!MediaRecorder.isTypeSupported(mimeType))mimeType='video/webm;codecs=vp8,opus';
  if(!MediaRecorder.isTypeSupported(mimeType))mimeType='video/webm';

  const recorder=new MediaRecorder(combinedStream,{mimeType,videoBitsPerSecond:8000000});
  const chunks=[];
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
  recorder.onstop=()=>{
    audioCtx.close();
    const blob=new Blob(chunks,{type:'video/webm'});
    onDone(blob);
  };

  recorder.start();
  if(sourceNode)sourceNode.start(0);

  const totalFrames=dur*VID_FPS;
  let frame=0;

  function renderFrame(){
    if(frame>totalFrames){recorder.stop();if(sourceNode)try{sourceNode.stop()}catch(e){};return}
    const t=frame/totalFrames;
    draw(offCvs,prod,t);
    onProgress(Math.round(t*100));
    frame++;
    setTimeout(renderFrame,1000/VID_FPS/2);
  }
  renderFrame();
}

/* ═══ PREVIEW ANIMATION ═══ */
function previewAnimation(cvs,prod){
  const start=performance.now();
  const dur=S.dur*1000;
  let running=true;
  function loop(){
    if(!running)return;
    const elapsed=performance.now()-start;
    const t=Math.min(1,elapsed/dur);
    draw(cvs,prod,t);
    if(t<1)requestAnimationFrame(loop);
    else draw(cvs,prod);
  }
  requestAnimationFrame(loop);
  return()=>{running=false};
}

/* ═══ RENDER PRODUCTS ═══ */
let activeAnimations={};

function renderProducts(){
  // Cancel running animations
  Object.values(activeAnimations).forEach(cancel=>cancel());
  activeAnimations={};

  const area=$("previewArea");area.innerHTML="";
  if(!products.length){
    area.innerHTML=`<div class="empty-state"><div>🛋️</div>Upload product images to generate ads</div>`;
    $("btnExportAll").disabled=true;return;
  }
  $("btnExportAll").disabled=false;
  const P=PLAT[S.plat];
  const maxPW=Math.min(360,area.clientWidth-80);
  const sc=Math.min(maxPW/P.w,500/P.h);
  const pw=P.w*sc,ph=P.h*sc;
  const isAr=S.lang==="ar";
  const isVideo=S.mode==="video";

  products.forEach((prod,idx)=>{
    const card=document.createElement("div");card.className="prod-card";
    card.innerHTML=`
      <div class="prod-num"><span>#${idx+1}${isVideo?' <span style="color:var(--red)">🎬 Video</span>':''}</span><button class="btn sm" data-action="remove" data-id="${prod.id}" style="color:#E53E3E;border-color:#E53E3E30">✕ Remove</button></div>
      <div class="prod-card-top">
        <canvas data-canvas="${prod.id}" style="width:${pw}px;height:${ph}px"></canvas>
        <div class="prod-fields">
          <div class="fld"><label>${isAr?"اسم المنتج":"Product Name"}</label><input data-field="name" data-id="${prod.id}" value="${prod.name||""}"></div>
          <div class="row">
            <div class="fld"><label>${isAr?"السعر القديم":"Old Price"}</label><input data-field="op" data-id="${prod.id}" value="${prod.op||""}" placeholder="499"></div>
            <div class="fld"><label>${isAr?"السعر الجديد":"New Price"}</label><input data-field="np" data-id="${prod.id}" value="${prod.np||""}" placeholder="299"></div>
          </div>
          <div data-discount="${prod.id}" style="font-size:12px;font-weight:600;color:var(--red);margin-top:4px"></div>
          <div class="prod-card-actions">
            ${isVideo?`
              <button class="btn sm" data-action="preview" data-id="${prod.id}">▶ Preview</button>
              <button class="btn sm red" data-action="exportvid" data-id="${prod.id}">Export WebM</button>
            `:`
              <button class="btn sm" data-action="export" data-id="${prod.id}">Export PNG</button>
            `}
          </div>
          <div data-status="${prod.id}" style="font-size:11px;color:var(--dim);margin-top:4px"></div>
        </div>
      </div>`;
    area.appendChild(card);
    const cvs=card.querySelector(`[data-canvas="${prod.id}"]`);
    draw(cvs,prod);
    updateDiscountDisplay(prod);
  });

  // Event delegation
  area.onclick=e=>{
    const btn=e.target.closest("[data-action]");if(!btn)return;
    const id=parseInt(btn.dataset.id);
    if(btn.dataset.action==="remove"){products=products.filter(p=>p.id!==id);renderProducts()}
    else if(btn.dataset.action==="export"){exportPNG(id)}
    else if(btn.dataset.action==="preview"){previewProd(id)}
    else if(btn.dataset.action==="exportvid"){exportVideo(id)}
  };
  area.oninput=e=>{
    const inp=e.target.closest("[data-field]");if(!inp)return;
    const id=parseInt(inp.dataset.id);
    const prod=products.find(p=>p.id===id);if(!prod)return;
    prod[inp.dataset.field]=inp.value.trim();
    const cvs=area.querySelector(`[data-canvas="${id}"]`);
    if(cvs)draw(cvs,prod);
    updateDiscountDisplay(prod);
  };
}

function updateDiscountDisplay(prod){
  const el=document.querySelector(`[data-discount="${prod.id}"]`);if(!el)return;
  const op=parseFloat(prod.op),np=parseFloat(prod.np);
  if(op>0&&np>0&&op>np){const pct=Math.round((1-np/op)*100);const sv=(op-np).toFixed(0);const c=CUR[S.mkt]||"KD";
    el.innerHTML=S.lang==="ar"?`خصم ${pct}% · توفير ${sv} ${c}`:`${pct}% OFF · Save ${c} ${sv}`;
  }else{el.innerHTML=""}
}

function exportPNG(id){
  const prod=products.find(p=>p.id===id);if(!prod)return;
  const off=document.createElement("canvas");draw(off,prod);
  const a=document.createElement("a");
  a.download=`midas_${S.tmpl}_${S.plat}_${S.mkt}_${(prod.name||"product").replace(/\s+/g,"_")}_${Date.now()}.png`;
  a.href=off.toDataURL("image/png",1);a.click();
}

function previewProd(id){
  const prod=products.find(p=>p.id===id);if(!prod)return;
  // Cancel any existing preview
  if(activeAnimations[id])activeAnimations[id]();
  const cvs=document.querySelector(`[data-canvas="${id}"]`);if(!cvs)return;
  const statusEl=document.querySelector(`[data-status="${id}"]`);
  if(statusEl)statusEl.innerHTML=`<span class="recording-badge">Playing ${S.dur}s</span>`;
  activeAnimations[id]=previewAnimation(cvs,prod);
  setTimeout(()=>{
    if(statusEl)statusEl.innerHTML='';
    delete activeAnimations[id];
  },S.dur*1000+200);
}

function exportVideo(id){
  const prod=products.find(p=>p.id===id);if(!prod)return;
  const btn=document.querySelector(`[data-action="exportvid"][data-id="${id}"]`);
  const statusEl=document.querySelector(`[data-status="${id}"]`);
  if(btn)btn.disabled=true;
  if(statusEl)statusEl.innerHTML=`<span class="recording-badge">Recording ${S.dur}s${musicBuffer?" 🎵":""}</span> 0%`;

  recordVideo(prod,
    pct=>{if(statusEl)statusEl.innerHTML=`<span class="recording-badge">Recording</span> ${pct}%`},
    blob=>{
      if(btn)btn.disabled=false;
      if(statusEl)statusEl.innerHTML=`✅ Done — ${(blob.size/1024/1024).toFixed(1)}MB`;
      const a=document.createElement("a");
      a.download=`midas_${S.tmpl}_${S.plat}_${S.mkt}_${(prod.name||"product").replace(/\s+/g,"_")}_${Date.now()}.webm`;
      a.href=URL.createObjectURL(blob);a.click();
    }
  );
}

/* ═══ BUILD UI ═══ */
function buildUI(){
  $("hdrLogoImg").src=S.lang==="ar"?LOGO_AR:LOGO_EN;
  // Mode toggle + video settings visibility
  document.querySelectorAll("#modeToggle button").forEach(b=>{
    b.className=b.dataset.mode===S.mode?"on":"";
  });
  $("videoSettings").style.display=S.mode==="video"?"block":"none";
  $("durSlider").value=S.dur;
  $("durLabel").textContent=S.dur+"s";
  const pg=$("platGrid");pg.innerHTML="";
  for(const[k,v] of Object.entries(PLAT)){const d=document.createElement("div");d.className="chip"+(S.plat===k?" on":"");
    d.innerHTML=`<small>${v.r}</small>${v.l}`;d.onclick=()=>{S.plat=k;buildUI();renderProducts()};pg.appendChild(d)}
  const tg=$("tmplGrid");tg.innerHTML="";
  for(const[k,v] of Object.entries(TMPL)){const d=document.createElement("div");d.className="chip"+(S.tmpl===k?" on":"");
    d.textContent=v;d.onclick=()=>{S.tmpl=k;buildUI();renderProducts()};tg.appendChild(d)}
  const sr=$("schemeRow");sr.innerHTML="";
  for(const[k,v] of Object.entries(SCH)){const d=document.createElement("div");d.className="sw"+(S.sch===k?" on":"");
    d.title=v.l;d.style.background=`linear-gradient(135deg,${v.bg} 50%,${v.pri} 50%)`;
    d.onclick=()=>{S.sch=k;buildUI();renderProducts()};sr.appendChild(d)}
  const ms=$("selMarket");ms.innerHTML="";
  MKT.forEach(m=>{const o=document.createElement("option");o.value=m;
    o.textContent=`${FLAG[m]} ${m} ${m==="KSA"?"ر.س":"("+CUR[m]+")"}`;if(S.mkt===m)o.selected=true;ms.appendChild(o)});
  const isAr=S.lang==="ar";
  $("btnLang").textContent=isAr?"عربي → EN":"EN → عربي";
  $("L_hl").textContent=isAr?"العنوان":"Headline";
  $("L_sub").textContent=isAr?"العنوان الفرعي":"Subline";
  $("lblShared").textContent=isAr?"النص المشترك":"Shared Text";
  ["F_hl","F_sub"].forEach(id=>{$(id).dir=/[\u0600-\u06FF]/.test($(id).value)?"rtl":"ltr"});
  const P=PLAT[S.plat];const safeNote=P.r==="9:16"?" · 250px safe":"";
  const modeLabel=S.mode==="video"?"WebM":"PNG";
  const durNote=S.mode==="video"?` · ${S.dur}s${musicBuffer?" · 🎵":""}`:""
  $("footInfo").textContent=`${P.w}×${P.h}px · ${P.r} · ${modeLabel}${safeNote}${durNote} · ${products.length} product(s)`;
  if(products.length>0){$("btnExportAll").innerHTML=`Export All ${modeLabel}s<span class="badge-count">${products.length}</span>`}
}

/* ═══ EVENTS ═══ */
$("modeToggle").onclick=e=>{
  const btn=e.target.closest("button");if(!btn)return;
  S.mode=btn.dataset.mode;buildUI();renderProducts();
};
$("durSlider").oninput=e=>{
  S.dur=parseInt(e.target.value);
  $("durLabel").textContent=S.dur+"s";
};
$("btnMusic").onclick=()=>$("musicIn").click();
$("musicIn").onchange=e=>{
  const file=e.target.files?.[0];if(!file)return;
  musicFile=file;
  $("musicInfo").innerHTML=`🎵 <strong>${file.name}</strong> (${(file.size/1024/1024).toFixed(1)}MB)`;
  $("btnMusic").textContent="🎵 Replace Music";
  $("btnMusic").style.color="var(--red)";
  // Decode audio buffer
  const reader=new FileReader();
  reader.onload=()=>{
    const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    audioCtx.decodeAudioData(reader.result).then(buffer=>{
      musicBuffer=buffer;
      const durStr=buffer.duration.toFixed(1);
      $("musicInfo").innerHTML=`🎵 <strong>${file.name}</strong> · ${durStr}s<br><button class="btn sm" id="btnClearMusic" style="margin-top:4px;color:#E53E3E;border-color:#E53E3E30">✕ Remove Music</button>`;
      $("btnClearMusic").onclick=()=>{musicBuffer=null;musicFile=null;
        $("musicInfo").innerHTML="MP3, WAV, OGG — trims to video duration";
        $("btnMusic").textContent="🎵 Upload Music";$("btnMusic").style.color=""};
      audioCtx.close();
    }).catch(err=>{
      $("musicInfo").innerHTML=`<span style="color:#E53E3E">Error decoding audio</span>`;
      musicBuffer=null;
    });
  };
  reader.readAsArrayBuffer(file);
  $("musicIn").value="";
};
$("selMarket").onchange=e=>{S.mkt=e.target.value;buildUI();renderProducts()};
$("btnLang").onclick=()=>{
  const n=S.lang==="en"?"ar":"en";S.lang=n;
  if(n==="ar"){$("F_hl").value="راحة فاخرة";$("F_sub").value="مصمم لمنزلك"}
  else{$("F_hl").value="Premium Comfort";$("F_sub").value="Designed for your home"}
  buildUI();renderProducts();
};
$("btnUpload").onclick=()=>$("fileIn").click();
$("fileIn").onchange=e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  let loaded=0;
  files.forEach(file=>{const img=new Image();
    img.onload=()=>{products.push({id:++prodIdCounter,img,name:file.name.replace(/\.[^.]+$/,"").replace(/[_-]/g," "),op:"",np:""});
      loaded++;if(loaded===files.length){buildUI();renderProducts()}};
    img.src=URL.createObjectURL(file);
  });$("fileIn").value="";
};
["F_hl","F_sub"].forEach(id=>{$(id).addEventListener("input",()=>{
  $(id).dir=/[\u0600-\u06FF]/.test($(id).value)?"rtl":"ltr";renderProducts()})});
$("btnExportAll").onclick=()=>{
  if(!products.length)return;
  if(S.mode==="image"){
    $("btnExportAll").disabled=true;
    const off=document.createElement("canvas");let i=0;
    const go=()=>{if(i>=products.length){$("btnExportAll").disabled=false;return}
      draw(off,products[i]);const a=document.createElement("a");
      a.download=`midas_${S.tmpl}_${S.plat}_${S.mkt}_${(products[i].name||"product").replace(/\s+/g,"_")}_${Date.now()}.png`;
      a.href=off.toDataURL("image/png",1);a.click();i++;setTimeout(go,450)};go();
  }else{
    // Sequential video export
    $("btnExportAll").disabled=true;let i=0;
    const go=()=>{if(i>=products.length){$("btnExportAll").disabled=false;return}
      exportVideo(products[i].id);
      // Wait for recording to finish (~S.dur + buffer)
      i++;setTimeout(go,(S.dur+2)*1000)};go();
  }
};

/* ═══ INIT ═══ */
Promise.all([document.fonts.ready,
  new Promise(r=>{if(logoEn.complete)r();else logoEn.onload=r}),
  new Promise(r=>{if(logoAr.complete)r();else logoAr.onload=r})
]).then(()=>{buildUI();renderProducts()});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
